<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>空间重述 - 历代制图类型热力分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --ancient-yellow: #f2e6c9;
            --vermilion: #962218;
            --gold: #b3935d;
            --ink: #1a1a1a;
        }
        body { 
            background: var(--ancient-yellow); 
            margin: 0; 
            font-family: "STKaiti", "STSong", serif; 
            overflow: hidden; 
        }
        /* 统一返回展厅样式 */
        .nav-back { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
        }
        .nav-back a { 
            color: var(--vermilion); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 18px;
            transition: all 0.3s;
        }
        .nav-back a:hover { text-shadow: 0 0 10px var(--gold); }
        
        .header-section {
            text-align: center;
            padding-top: 25px; 
            position: relative;
            z-index: 10;
            left: 18vw;
        }
        h2 { 
            color: var(--vermilion); 
            border-bottom: 2px solid var(--vermilion); 
            display: inline-block; 
            padding-bottom: 5px; 
            margin: 0;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .chart-container { 
            width: 60%; 
            height: 74vh; 
            margin: 36px auto; 
            position: relative;
            left: 18vw;
            border: 2px solid var(--gold); 
            padding: 10px; 
            background: rgba(255,255,255,0.2); 
            box-sizing: border-box;
            box-shadow: inset 0 0 50px rgba(179,147,93,0.1);
        }

        /* 悬浮窗样式 */
        .custom-tooltip {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(242, 230, 201, 0.98);
            border: 2px solid var(--gold);
            box-shadow: 8px 8px 20px rgba(0,0,0,0.2);
            min-width: 280px;
            backdrop-filter: blur(4px);
        }
        .tooltip-img {
            width: 60px; height: 80px;
            background: #d1c1a5;
            border: 1px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #fff; text-align: center;
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 0, transparent 3px);
        }
        .tooltip-line { width: 2px; height: 60px; background: var(--vermilion); margin: 0 15px; opacity: 0.7; }
        .tooltip-text { flex: 1; color: var(--ink); line-height: 1.5; font-size: 14px; }
        .tooltip-text b { color: var(--vermilion); font-size: 16px; }
    </style>
</head>
<body>
    <div class="nav-back"><a href="visualization.html">← 返回展厅</a></div>
    
    <div class="header-section">
        <h2>历代舆图：制图重心变迁热力图</h2>
    </div>

    <div id="main" class="chart-container"></div>

    <script>
        var chart = echarts.init(document.getElementById('main'));
        var gridTopPct = 10;
        var gridBottomPct = 10;
        function getVisualMapHeight() {
            // 右侧色条略短于绘图区，避免视觉上“过高”
            return Math.round(chart.getHeight() * (1 - (gridTopPct + gridBottomPct) / 100) * 0.82);
        }

        // 朝代与分类定义
        var dynasties = ['秦/晋', '唐代', '北宋', '南宋', '元代', '明代', '清代'];
        var categories = ['全国总图', '区域地图', '历史沿革图', '城市地图', '军事边防图', '河工水利图', '航海图', '陵墓、宗教风水', '其他'];

        // [朝代索引, 分类索引, 占比%]
        // 数据基于全CSV样本分析硬编码
        var data = [
            [0,1,100], [0,2,0], // 秦晋偏重区域与沿革
            [1,0,30], [1,2,70], // 唐代沿革图兴盛
            [2,0,55.6], [2,2,11.1], [2,3,22.2], [2,8,11.1], // 宋代全国总图占主导
            [3,0,16], [3,1,12], [3,2,56], [3,3,12], [3,7,4], // 南宋沿革与风水
            [4,3,100], // 元代城市图留存较多
            [5,0,11.3], [5,1,16.5], [5,2,2.1], [5,3,4.1], [5,4,22.7], [5,5,1], [5,6,1], [5,7,1], [5,8,40.3], // 明代多元化
            [6,0,2.6], [6,1,81.3], [6,2,0.7], [6,3,6.3], [6,4,0.4], [6,5,2.4], [6,7,0.4], [6,8,5.9]  // 清代区域地图（方志图）爆发
        ];

        var option = {
            backgroundColor: 'transparent',
            tooltip: {
                position: 'top',
                backgroundColor: 'transparent',
                borderWidth: 0,
                formatter: function (params) {
                    var val = params.value[2];
                    var status = val > 50 ? '核心重镇' : (val > 20 ? '重要类型' : '辅助参考');
                    return `
                        <div class="custom-tooltip">
                            <div class="tooltip-text">
                                <b>${categories[params.value[1]]}</b><br/>
                                <small>时期：${dynasties[params.value[0]]}</small><br/>
                                <span>构成占比：${val}%</span><br/>
                                <div style="margin-top:5px; color:#962218; font-weight:bold;">${status}</div>
                            </div>
                        </div>`;
                }
            },
            grid: { top: gridTopPct + '%', bottom: gridBottomPct + '%', left: '12%', right: '13%' },
            xAxis: {
                type: 'category', data: dynasties,
                axisLine: { lineStyle: { color: '#b3935d' } },
                axisLabel: { fontFamily: 'STKaiti', fontSize: 16, color: '#1a1a1a' },
                splitArea: { show: true }
            },
            yAxis: {
                type: 'category', data: categories,
                axisLine: { lineStyle: { color: '#b3935d' } },
                axisLabel: { fontFamily: 'STKaiti', fontSize: 14, color: '#1a1a1a' },
                splitArea: { show: true }
            },
            visualMap: {
                min: 0, max: 100,
                calculable: true,
                orient: 'vertical',
                right: '2%',
                top: '18%',
                itemHeight: getVisualMapHeight(),
                text: ['高占比', '低占比'],
                textStyle: { color: '#1a1a1a', fontFamily: 'STKaiti' },
                inRange: { color: ['#fdf5e6', '#d1c1a5', '#962218'] }
            },
            series: [{
                name: '占比',
                type: 'heatmap',
                data: data,
                label: {
                    show: true,
                    formatter: function(p){
                        var val = p.value[2];
                        if (val <= 0) return '';
                        return val >= 25 ? '{hi|' + val + '%}' : '{lo|' + val + '%}';
                    },
                    rich: {
                        hi: { color: '#fff' },
                        lo: { color: '#7a7a7a' }
                    },
                    fontSize: 10, fontFamily: 'Arial'
                },
                emphasis: {
                    itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                },
                // 动态入场动画
                animationDelay: function (idx) { return idx * 12; },
                animationDuration: 700
            }]
        };

        chart.setOption(option);
        window.onresize = function() {
            chart.resize();
            chart.setOption({ visualMap: { itemHeight: getVisualMapHeight() } });
        };
    </script>
</body>
</html>
